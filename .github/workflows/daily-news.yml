name: Daily AI News

on:
  # Triggered by Vercel Cron via /api/cron/trigger-news (repository_dispatch)
  # for reliable timing — GitHub's own cron schedule drifts by hours.
  repository_dispatch:
    types: [daily-news]
  workflow_dispatch:

jobs:
  curate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Run curation pipeline
        working-directory: pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          uv run --with-requirements requirements.txt --system-certs python curate.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pipeline/seen.json app/data/news.json
          git diff --cached --quiet || git commit -m "chore: daily AI news update"
          git push
