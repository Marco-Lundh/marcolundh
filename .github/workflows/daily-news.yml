name: Daily AI News

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  curate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Run curation pipeline
        working-directory: pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MAILERLITE_API_KEY: ${{ secrets.MAILERLITE_API_KEY }}
        run: |
          uv run --with-requirements requirements.txt --system-certs python curate.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pipeline/seen.json app/data/news.json
          git diff --cached --quiet || git commit -m "chore: daily AI news update"
          git push
